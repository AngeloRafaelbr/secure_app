<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backup</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ===================================================
       ESTILOS ESPECÍFICOS DA PÁGINA DE BACKUP
       Complementam o style.css global
    =================================================== */

    /* container das abas de tipo de backup */
    .abas {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    /* botão de aba — estado inativo */
    .aba {
      padding: 9px 20px;
      border: 2px solid #ddd;
      border-radius: 5px;
      background: white;
      cursor: pointer;
      font-size: 14px;
      color: #555;
    }

    /* botão de aba — estado ativo */
    .aba.ativa {
      border-color: #2980b9;
      background: #2980b9;
      color: white;
    }

    /* painel de conteúdo de cada aba — escondido por padrão */
    .painel-aba {
      display: none;
    }

    /* painel ativo — visível */
    .painel-aba.ativo {
      display: block;
    }

    /* grade dos checkboxes dos dias da semana */
    .dias-semana {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    /* cada item dia da semana */
    .dia-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: #555;
    }

    /* checkbox do dia estilizado */
    .dia-item input[type="checkbox"] {
      width: 36px;
      height: 36px;
      cursor: pointer;
      accent-color: #2980b9;
    }

    /* linha de inputs de horário */
    .linha-horario {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    /* select de hora e minuto */
    .linha-horario select {
      width: 80px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
    }

    /* separador : entre hora e minuto */
    .linha-horario span {
      font-size: 20px;
      font-weight: bold;
      color: #555;
    }

    /* checkbox de repetir mensalmente */
    .checkbox-linha {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #555;
    }

    .checkbox-linha input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #2980b9;
    }
  </style>
</head>
<body>

  <!-- ===================================================
       NAVBAR — barra de navegação superior
  =================================================== -->
  <nav class="navbar">
    <a href="usuarios.html" class="navbar-logo">🔒 SecureApp</a>
    <div class="navbar-links">
      <a href="usuarios.html">Usuários</a>
      <a href="backup.html">Backup</a>
      <a href="logs.html">Logs</a>
      <span class="navbar-usuario" id="nomeUsuario"></span>
      <a href="#" id="btnSair">Sair</a>
    </div>
  </nav>

  <div class="container">

    <h1>💾 Backup & Restore</h1>

    <!-- alertas de erro e sucesso — controlados pelo JS -->
    <div class="alerta alerta-erro" id="mensagemErro"></div>
    <div class="alerta alerta-sucesso" id="mensagemSucesso"></div>

    <!-- ===================================================
         SEÇÃO 1 — BACKUP MANUAL
         Botão simples que dispara o backup imediatamente
    =================================================== -->
    <div class="card">
      <h2>▶ Backup Manual</h2>
      <p style="font-size:14px;color:#666;margin-bottom:16px">
        Gera um arquivo .sql com todos os dados do banco agora.
      </p>
      <button class="btn btn-sucesso" id="btnBackupAgora">
        💾 Fazer Backup Agora
      </button>
    </div>

    <!-- ===================================================
         SEÇÃO 2 — BACKUP AGENDADO
         Duas abas: Recorrente, Eventual
         O usuário escolhe o tipo e preenche o formulário
         O JavaScript converte para expressão cron
         antes de enviar para o backend
    =================================================== -->
    <div class="card">
      <h2>📅 Agendar Backup Automático</h2>

      <!-- abas de tipo de agendamento -->
      <div class="abas">
        <button class="aba ativa" id="abaRecorrente"
          onclick="trocarAba('recorrente')">
          🔁 Recorrente
        </button>
        <button class="aba" id="abaEventual"
          onclick="trocarAba('eventual')">
          📆 Eventual
        </button>
      </div>

      <!-- - - - - - - - - - - - - - - - - - - - - - - -
           PAINEL — BACKUP RECORRENTE
           Usuário seleciona dias da semana e horário
           Ex: Segunda + 03:00 → cron: "0 3 * * 1"
      - - - - - - - - - - - - - - - - - - - - - - - - -->
      <div class="painel-aba ativo" id="painelRecorrente">

        <label style="margin-bottom:10px;display:block">
          Selecione o(s) dia(s) da semana:
        </label>

        <!-- checkboxes dos dias — value = número do dia no cron
             0=domingo, 1=segunda, 2=terça... 6=sábado -->
        <div class="dias-semana">
          <div class="dia-item">
            <input type="checkbox" class="dia-check" value="1" id="seg">
            <label for="seg">Seg</label>
          </div>
          <div class="dia-item">
            <input type="checkbox" class="dia-check" value="2" id="ter">
            <label for="ter">Ter</label>
          </div>
          <div class="dia-item">
            <input type="checkbox" class="dia-check" value="3" id="qua">
            <label for="qua">Qua</label>
          </div>
          <div class="dia-item">
            <input type="checkbox" class="dia-check" value="4" id="qui">
            <label for="qui">Qui</label>
          </div>
          <div class="dia-item">
            <input type="checkbox" class="dia-check" value="5" id="sex">
            <label for="sex">Sex</label>
          </div>
          <div class="dia-item">
            <input type="checkbox" class="dia-check" value="6" id="sab">
            <label for="sab">Sáb</label>
          </div>
          <div class="dia-item">
            <input type="checkbox" class="dia-check" value="0" id="dom">
            <label for="dom">Dom</label>
          </div>
        </div>

        <!-- seletor de horário -->
        <label style="margin-bottom:8px;display:block">Horário:</label>
        <div class="linha-horario">
          <!-- select de horas gerado pelo JS (00 a 23) -->
          <select id="horaRecorrente"></select>
          <span>:</span>
          <!-- select de minutos — apenas 00, ... 60 -->
          <select id="minutoRecorrente"></select>
        </div>

        <label style="margin-bottom:8px;display:block">
          Descrição (opcional):
        </label>
        <input type="text" id="descricaoRecorrente"
          placeholder="ex: Backup semanal às 3h"
          style="margin-bottom:16px">

        <button class="btn btn-primario" id="btnAgendarRecorrente">
          📅 Agendar Backup Recorrente
        </button>

      </div>

      <!-- - - - - - - - - - - - - - - - - - - - - - - -
           PAINEL — BACKUP EVENTUAL
           Usuário seleciona uma data no calendário e horário
           Checkbox opcional para repetir todo mês naquele dia
           Ex: 15/04/2026 + 14:00 → cron: "0 14 15 4 *"
           Ex: com repetição mensal → cron: "0 14 15 * *"
      - - - - - - - - - - - - - - - - - - - - - - - - -->
      <div class="painel-aba" id="painelEventual">

        <label style="margin-bottom:8px;display:block">
          Selecione a data:
        </label>

        <!-- input date — abre calendário nativo do browser
             min é preenchido pelo JS com a data de hoje
             para bloquear datas passadas -->
        <input type="date" id="dataEventual"
          style="width:auto;margin-bottom:16px">

        <label style="margin-bottom:8px;display:block">Horário:</label>
        <div class="linha-horario">
          <select id="horaEventual"></select>
          <span>:</span>
          <select id="minutoEventual">
            <option value="00">00</option>
            <option value="15">15</option>
            <option value="30">30</option>
            <option value="45">45</option>
          </select>
        </div>

        <!-- checkbox para repetição mensal -->
        <div class="checkbox-linha">
          <input type="checkbox" id="repetirMensalmente">
          <label for="repetirMensalmente">
            Repetir mensalmente neste dia
          </label>
        </div>

        <label style="margin-bottom:8px;display:block">
          Descrição (opcional):
        </label>
        <input type="text" id="descricaoEventual"
          placeholder="ex: Backup mensal dia 15"
          style="margin-bottom:16px">

        <button class="btn btn-primario" id="btnAgendarEventual">
          📆 Agendar Backup Eventual
        </button>

      </div>

      <!-- lista de agendamentos salvos no banco -->
      <div id="listaAgendamentos" style="margin-top:24px"></div>

    </div>

    <!-- ===================================================
         SEÇÃO 3 — RESTORE
         Seleciona um backup da lista e restaura o banco
         Exige confirmação antes de executar
    =================================================== -->
    <div class="card">
      <h2>↩ Restaurar Backup</h2>
      <p style="font-size:13px;color:#c0392b;margin-bottom:16px">
        ⚠️ Atenção: o restore substituirá todos os dados atuais do banco!
      </p>

      <label>Selecione um backup para restaurar</label>
      <select id="selectBackup" style="margin-bottom:16px">
        <option value="">-- Carregando backups... --</option>
      </select>

      <button class="btn btn-perigo" id="btnRestore">
        ↩ Restaurar Banco
      </button>
    </div>

    <!-- ===================================================
         SEÇÃO 4 — LISTA DE BACKUPS DISPONÍVEIS
         Exibe os arquivos .sql gerados
         Permite download e exclusão de cada arquivo
    =================================================== -->
    <div class="card">
      <h2>📁 Backups Disponíveis</h2>
      <div id="listaBackups">
        <p style="color:#999;font-size:14px">Carregando...</p>
      </div>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/backup.js"></script>

</body>
</html>

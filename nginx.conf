# redireciona todo HTTP para HTTPS
server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
}

# servidor HTTPS principal
server {
    listen 443 ssl;
    server_name _;

    # certificado auto-assinado
    ssl_certificate     /etc/nginx/ssl/cert.crt;
    ssl_certificate_key /etc/nginx/ssl/cert.key;

    # protocolos seguros — desabilita versões antigas
    ssl_protocols TLSv1.2 TLSv1.3;

    # algoritmos de criptografia recomendados
    ssl_ciphers HIGH:!aNULL:!MD5;

    # serve os arquivos estáticos do frontend
    location / {
        root /usr/share/nginx/html;
        index login.html;

        # necessário para navegação entre páginas
        try_files $uri $uri/ /login.html;
    }

    # redireciona chamadas /api/* para o backend
    # o frontend chamará https://IP/api/usuarios
    # ao invés de http://localhost:3000/usuarios
    location /api/ {

        # remove o /api do caminho antes de mandar
        # ex: /api/usuarios → /usuarios
        rewrite ^/api/(.*) /$1 break;

        # endereço do backend dentro da rede Docker
        # 'backend' é o nome do serviço no docker-compose
        proxy_pass http://backend:3000;

        proxy_http_version 1.1;

        # headers necessários para o backend
        # identificar corretamente o cliente
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # repassa cookies do browser para o backend
        proxy_set_header Cookie $http_cookie;

        # repassa o Set-Cookie do backend para o browser
        proxy_pass_header Set-Cookie;
    }
}